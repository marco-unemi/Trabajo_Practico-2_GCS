{% extends 'public/login/base_login.html' %}
<!---->
{% block crud %}Crud con Python | recuperar clave{% endblock %}
<!---->
{% block body %}

<div class="docker-login-screen">
  <div class="login-wave login-wave-one"></div>
  <div class="login-wave login-wave-two"></div>

  <div class="auth-card">
    <div class="auth-card-body">
      <div class="docker-brand">
        <span class="docker-logo">
          <i class="bi bi-box-seam-fill"></i>
          <i class="bi bi-water"></i>
        </span>
        <h4>Recuperar clave</h4>
        <p>Ingresa tu correo para iniciar el proceso de recuperacion.</p>
      </div>

      <form
        id="formAuthentication"
        action="{{ url_for('inicio') }}"
        method="POST">
        <div class="auth-field">
          <label for="email_user">Email</label>
          <div class="auth-input">
            <i class="bi bi-envelope"></i>
            <input
              type="email"
              name="email_user"
              id="email_user"
              placeholder="Ingresa tu email"
              required
              autofocus />
          </div>
        </div>

        <button class="btn docker-login-btn w-100" type="submit">
          Recuperar clave
          <i class="bi bi-arrow-right-circle"></i>
        </button>
      </form>

      <p class="auth-help">
        <a href="{{ url_for('inicio') }}">
          <i class="bx bx-chevron-left scaleX-n1-rtl"></i>
          Volver al login
        </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
