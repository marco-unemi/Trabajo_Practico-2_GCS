{% extends 'public/login/base_login.html' %}
<!---->
{% block crud %}Crud con Python | crear cuenta{% endblock %}
<!---->
{% block body %}

<div class="docker-login-screen">
  <div class="login-wave login-wave-one"></div>
  <div class="login-wave login-wave-two"></div>

  <div class="auth-card auth-card-register">
    <div class="auth-card-body">
      <div class="docker-brand">
        <span class="docker-logo">
          <i class="bi bi-box-seam-fill"></i>
          <i class="bi bi-water"></i>
        </span>
        <h4>Crear usuario</h4>
        <p>Completa tus datos para crear una cuenta y acceder al panel.</p>
      </div>

      <form
        action="{{ url_for('cpanelResgisterUserBD') }}"
        method="POST">
        <div class="auth-field">
          <label for="name_surname">Nombre y apellido</label>
          <div class="auth-input">
            <i class="bi bi-person"></i>
            <input
              type="text"
              name="name_surname"
              id="name_surname"
              placeholder="Ingresa tu nombre completo"
              required
              autofocus />
          </div>
        </div>

        <div class="auth-field">
          <label for="email_user">Email</label>
          <div class="auth-input">
            <i class="bi bi-envelope"></i>
            <input
              type="email"
              name="email_user"
              id="email_user"
              placeholder="Ingresa tu email"
              required />
          </div>
        </div>

        <div class="auth-field form-password-toggle">
          <label for="pass_user">Clave</label>
          <div class="auth-input">
            <i class="bi bi-lock"></i>
            <input
              type="password"
              name="pass_user"
              id="pass_user"
              placeholder="Ingresa tu clave"
              required />
            <span class="cursor-pointer"><i class="bx bx-hide"></i></span>
          </div>
        </div>

        <button class="btn docker-login-btn w-100" type="submit">
          Crear cuenta
          <i class="bi bi-arrow-right-circle"></i>
        </button>
      </form>

      <p class="auth-help">
        <a href="{{ url_for('inicio') }}">
          <i class="bx bx-chevron-left scaleX-n1-rtl"></i>
          Volver al login
        </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
